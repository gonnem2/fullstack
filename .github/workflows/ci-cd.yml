name: CI/CD — FinanceTrack

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main]

# Не запускать несколько пайплайнов одновременно для одной ветки
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/financetrack-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/financetrack-frontend

# ═══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── 1. Backend тесты ─────────────────────────────────────────────────────────
  backend-tests:
    name: "Backend — pytest"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       financetrack_test
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d financetrack_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211

    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install uv
        run: pip install uv

      - name: Setup venv
        run: uv venv

      - name: Install deps (uv + pyproject)
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install .[dev]

      - name: Run pytest
        env:
          DATABASE_URL:   postgresql+asyncpg://testuser:testpassword@localhost:5432/financetrack_test
          MEMCACHED_HOST: localhost
          MEMCACHED_PORT: "11211"
          SECRET_KEY:     ci_test_secret_key_not_for_production
          S3_ENDPOINT_URL: ""
          ENVIRONMENT:    test
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results.xml

  # ── 2. Frontend тесты ────────────────────────────────────────────────────────
  frontend-tests:
    name: "Frontend — npm run test:coverage"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ── 3. Сборка Docker-образов ─────────────────────────────────────────────────
  build:
    name: "Docker build"
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    # Собираем только при пуше в main/develop (не на PR)
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Метаданные для тегов образов
      - name: Docker metadata — backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker metadata — frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Сборка и публикация backend
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Сборка и публикация frontend
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Деплой на сервер (только main) ────────────────────────────────────────
  deploy:
    name: "Deploy → production"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # защищённое окружение в GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/financetrack

            # Обновляем код
            git pull origin main

            # Логинимся в registry на сервере
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Скачиваем новые образы
            docker compose pull

            # Поднимаем с минимальным downtime
            docker compose up -d --remove-orphans

            # Ждём healthcheck бэкенда
            echo "Waiting for backend..."
            for i in $(seq 1 12); do
              if docker compose exec -T backend curl -sf http://localhost:8000/health; then
                echo "Backend is up!"
                break
              fi
              sleep 5
            done

            # Удаляем старые образы
            docker image prune -f
