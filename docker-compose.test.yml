version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Тестовое окружение — используется в CI и локально:
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
# ─────────────────────────────────────────────────────────────────────────────

services:

  # Тестовая БД (in-memory данные, удаляется после остановки)
  postgres_test:
    image: postgres:16-alpine
    container_name: ft_postgres_test
    environment:
      POSTGRES_DB:       financetrack_test
      POSTGRES_USER:     testuser
      POSTGRES_PASSWORD: testpassword
    tmpfs:
      - /var/lib/postgresql/data   # данные только в памяти
    networks:
      - test_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d financetrack_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  memcached_test:
    image: memcached:1.6-alpine
    container_name: ft_memcached_test
    networks:
      - test_net

  # Запуск backend-тестов
  backend_test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ft_backend_test
    command: >
      sh -c "pip install pytest pytest-asyncio httpx aiosqlite --quiet &&
             pytest tests/ -v --tb=short"
    environment:
      DATABASE_URL:   postgresql+asyncpg://testuser:testpassword@postgres_test:5432/financetrack_test
      MEMCACHED_HOST: memcached_test
      MEMCACHED_PORT: "11211"
      S3_ENDPOINT_URL: ""
      SECRET_KEY:     testsecretkey
    depends_on:
      postgres_test:
        condition: service_healthy
    networks:
      - test_net

  # Запуск frontend-тестов
  frontend_test:
    image: node:20-alpine
    container_name: ft_frontend_test
    working_dir: /app
    command: >
      sh -c "npm ci --prefer-offline && npm run test:coverage"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CI: "true"

networks:
  test_net:
    driver: bridge
