version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# FinanceTrack — полный стек
# Запуск:  docker compose up -d
# Остановка: docker compose down
# Пересборка: docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ft_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-financetrack}
      POSTGRES_USER:     ${POSTGRES_USER:-ftuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ftpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ftuser} -d ${POSTGRES_DB:-financetrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Memcached (хранение сессий / refresh-токенов) ───────────────────────────
  memcached:
    image: memcached:1.6-alpine
    container_name: ft_memcached
    restart: unless-stopped
    command: memcached -m 128
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "echo stats | nc 127.0.0.1 11211 | grep -q uptime"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── MinIO (S3-совместимое объектное хранилище) ──────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ft_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # MinIO Console (только в dev)
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ft_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER:-ftuser}:${POSTGRES_PASSWORD:-ftpassword}@postgres:5432/${POSTGRES_DB:-financetrack}
      MEMCACHED_HOST:    memcached
      MEMCACHED_PORT:    "11211"
      S3_ENDPOINT_URL:   http://minio:9000
      S3_ACCESS_KEY:     ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY:     ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET_NAME:    ${S3_BUCKET_NAME:-financetrack}
    depends_on:
      postgres:
        condition: service_healthy
      memcached:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── React Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ft_frontend
    restart: unless-stopped
    networks:
      - frontend_net
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ft_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Тома ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:

# ── Сети ────────────────────────────────────────────────────────────────────
networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge
