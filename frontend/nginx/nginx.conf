server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Кеш для статики с хешами в именах (Vite генерирует assets/file-abc123.js)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # robots.txt и sitemap.xml — отдаём из public/
    location = /robots.txt  { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }

    # Healthcheck endpoint для Docker
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA: все остальные маршруты → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
