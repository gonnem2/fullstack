[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (with DB and mocks)
    e2e: End-to-end tests (full scenarios)

addopts =
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term
    --cov-report=html:htmlcov
    --cov-fail-under=70